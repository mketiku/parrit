# .gemini/policies/workspace.toml
# Workspace-level policy for the pairing project
# Stack: Vite + React + TypeScript + Vitest + Supabase + Playwright

# ── Portable Project Introspection ──────────────────────────────────────────

# Block absolute paths in ls commands
[[rule]]
toolName = "run_command"
argsPattern = '"CommandLine":"ls( .*)? /.*"'
decision = "deny"
priority = 500
modes = ["default", "autoEdit", "plan"]
denyMessage = "Workspace policy restricts 'ls' to relative paths within the project."

# Block directory traversal
[[rule]]
toolName = "run_command"
argsPattern = '"CommandLine":"ls.*\\.\\..*"'
decision = "deny"
priority = 505
modes = ["default", "autoEdit", "plan"]
denyMessage = "Directory traversal (../) is prohibited in workspace rules."

# Allow project-local ls
[[rule]]
toolName = "run_command"
commandPrefix = "ls"
decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

# ── Workspace Scaffolding & Navigation ──────────────────────────────────────

[[rule]]
toolName = "run_command"
commandPrefix = "mkdir -p "
decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "find "
decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "grep "
decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

[[rule]]
toolName = "run_command"
commandPrefix = "rg "
decision = "allow"
priority = 400
modes = ["default", "autoEdit", "plan"]

# ── Git Operations ────────────────────────────────────────────────────────────

