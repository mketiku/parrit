name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: http://mock-supabase.local
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check & Build
        run: npm run build

      - name: Unit & Integration Tests (Vitest)
        run: npm run test

      # E2E tests are commented out because they require a real server and possibly local database (Supabase)
      # - name: Run E2E tests
      #   run: npx playwright test
